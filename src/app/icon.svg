<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Barra que liga os dois círculos verdes (a "ligação") -->
  <line x1="50" y1="66" x2="84" y2="40" stroke="#0a9d48" stroke-width="22" stroke-linecap="round" />
  <!-- Círculo verde grande (topo direito) -->
  <circle cx="86" cy="38" r="26" fill="#0a9d48" />
  <!-- Círculo verde menor (inferior) -->
  <circle cx="48" cy="68" r="18" fill="#0a9d48" />
  <!-- Círculo dourado (canto inferior esquerdo) -->
  <circle cx="30" cy="86" r="18" fill="#f6b40a" />
</svg>
